name: Windows verify

# Runs the full gate *natively* on the Windows Server 2022 host, then proves the
# built .exe actually serves. This is what closes M1's last open item — the
# "runs on WS2022" claim that cross-compilation cannot establish.
#
# SECURITY — this repository is PUBLIC and this job runs on a self-hosted
# runner inside the on-prem network, on a host that will hold DHCP
# administrative rights. Code that reaches this runner is code executing on
# internal infrastructure. Three layers keep untrusted code away from it:
#
#   1. NO pull_request TRIGGER. This is the load-bearing one. Only push-to-main
#      and manual dispatch start this workflow, and both require write access
#      to the repository. A fork cannot trigger either, so an outside
#      contributor has no path to this runner at all — not a guarded path, no
#      path. Trunk-based development (docs/how-we-work.md) makes this cheap:
#      work lands on main, so push coverage is effectively full coverage.
#   2. The same-repo condition on the job below. Inert while there is no
#      pull_request trigger — it exists as a tripwire, so that re-adding one
#      does not silently open the runner.
#   3. Third-party actions pinned to commit SHAs, not tags. A tag is mutable:
#      whoever controls actions/checkout can repoint v6 and run arbitrary code
#      here. On a cloud runner that costs a container; on this one it costs the
#      network. Pin every action added to this file, and never use a tag.
#
# The runner is long-lived, not ephemeral, so its work directory persists
# between jobs (see the PERSISTENCE note in bootstrap-windows-runner.ps1).
#
# Do not add pull_request or pull_request_target here. If PR-time Windows
# coverage is ever genuinely needed, the answer is a merge queue or a
# maintainer-triggered dispatch — not opening this trigger up.
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

# One run at a time: there is a single physical host behind these labels, and
# two adapters binding the same port would fail each other spuriously.
concurrency:
  group: windows-verify
  cancel-in-progress: false

jobs:
  verify:
    name: Build, test & smoke on WS2022
    # Tripwire — see layer 2 in the SECURITY note above. Inert today, since
    # nothing here fires on pull_request; it is here so that adding one does
    # not silently expose the runner.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows, ws2022]
    timeout-minutes: 25
    defaults:
      run:
        shell: pwsh

    steps:
      # SHA-pinned, not tag-pinned — see layer 3 in the SECURITY note above.
      # Comments record the tag each SHA corresponded to when pinned.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # No actions/setup-go here, deliberately. The toolchain on this host is
      # pinned and owned by infra's Ansible role; setup-go would download a
      # second Go into the tool cache and shadow it — exactly the version skew
      # infra warned about. Jobs also run as NT AUTHORITY\NetworkService, so
      # write access to the tool cache is not a given.
      #
      # The tradeoff is that the runner's Go does not follow go.mod. The check
      # below turns that from a confusing compile error into a clear failure
      # naming the team that has to act.
      - name: Assert the host toolchain satisfies go.mod
        run: |
          Write-Host "host : $env:COMPUTERNAME"
          Write-Host "os   : $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "user : $([Security.Principal.WindowsIdentity]::GetCurrent().Name)"
          go version
          task --version

          $required = (Select-String -Path go.mod -Pattern '^go\s+(\S+)').Matches[0].Groups[1].Value
          $actual   = (go version) -replace '^go version go(\S+).*$', '$1'
          Write-Host "go.mod requires $required; host has $actual"

          if ([version]$actual -lt [version]$required) {
            throw "Host Go $actual is older than go.mod requires ($required). The runner's Go is pinned in infra's Ansible role and does not follow go.mod — ask the infrastructure team to bump it before merging a go.mod change."
          }

      # Scoped to what only Windows can answer — build, test, and drive the real
      # .exe. See the ci:windows task for what is omitted and why.
      - name: Windows gate (build, test, smoke)
        run: task ci:windows

