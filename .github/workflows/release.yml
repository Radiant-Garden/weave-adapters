name: Release

# Trunk-based: releases are cut by pushing a version tag (e.g. v0.1.0), which
# triggers this workflow. Full GoReleaser pipeline is planned for M4; for now
# this builds and publishes the Windows binary.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish Windows binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -o dist/weave-adapter-dhcp-windows.exe ./cmd/weave-adapter-dhcp-windows

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/weave-adapter-dhcp-windows.exe --generate-notes
