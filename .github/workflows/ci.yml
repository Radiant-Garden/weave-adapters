name: CI

on:
  push:
    branches: [main]
    # Skip CI when a push touches only docs (no code to gate).
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Was a ["1.26", "stable"] matrix. Both resolved to the same release
      # while 1.26 is the newest minor, so it ran one job twice. Reinstate a
      # matrix when testing a second Go line actually means something -- 1.27
      # shipping, or a floor older than go.mod's.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # go.mod is the single source of truth for the version, the same way
          # the Windows gate asserts against it.
          go-version-file: go.mod

      - name: Verify dependencies
        run: |
          go mod verify
          go mod download

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build (host)
        run: go build ./...

      - name: Build (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...

      # The same end-to-end check the Windows gate runs, from the same source.
      # Running it here is the point: a regression in the adapter surfaces on
      # this fast job instead of only on the single serialized WS2022 host.
      - name: Smoke test the built binary
        run: go test -count=1 -tags smoke -run TestSmoke ./cmd/...

      # SHA-pinned: repository policy blocks bare tags at startup. The trailing
      # comment records the tag this SHA stood for.
      #
      # No token: the Codecov GitHub App is installed on the org, which is what
      # authorizes the tokenless upload. There is deliberately no CODECOV_TOKEN
      # fallback -- an unset secret is not a fallback, it is the failure this
      # step spent its first weeks in. Uploads ran with an empty token and a
      # non-blocking error for that whole time, so every push logged
      # "Token required - not valid tokenless upload" and stayed green while
      # the README badge read "unknown". fail_ci_if_error is true so the next
      # such break is loud. The cost is that a Codecov outage blocks a merge;
      # if that ever actually bites, drop the flag rather than the app.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
        with:
          files: coverage.out
          fail_ci_if_error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      # Installed directly rather than via golangci/golangci-lint-action.
      # Repository policy allows GitHub-owned and verified-marketplace actions;
      # golangci is neither, so the action is rejected before the run starts.
      # An allowlist exception would be a standing widening of that policy to
      # save two lines, so the dependency goes instead. Version stays pinned to
      # the locally verified toolchain -- bump deliberately, with Taskfile.
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          golangci-lint config verify
          golangci-lint run ./...

  generate-check:
    name: Generate check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Regenerate and diff
        run: |
          go generate ./...
          # Scope to generated outputs (docs/ = event catalog from Phase 3;
          # add api/**/generated when oapi-codegen lands in M2).
          git diff --exit-code -- docs

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
