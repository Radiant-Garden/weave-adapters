name: CI

on:
  push:
    branches: [main]
    # Skip CI when a push touches only docs (no code to gate).
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.26", "stable"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Verify dependencies
        run: |
          go mod verify
          go mod download

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build (host)
        run: go build ./...

      - name: Build (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...

      # Publish coverage once, from the pinned Go version (avoids double upload
      # across the matrix).
      # Third-party actions are SHA-pinned and allowlisted by infra policy; a
      # bare tag is blocked at startup. Comment records the tag at pin time.
      - name: Upload coverage to Codecov
        if: matrix.go == '1.26'
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      # SHA-pinned per infra policy; see the Codecov note above.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@db9de0fc1a667e1a49d2291a1a042dff081d78f6 # v9
        with:
          # Pinned to match the locally verified toolchain; bump deliberately.
          version: v2.11.4

  generate-check:
    name: Generate check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Regenerate and diff
        run: |
          go generate ./...
          # Scope to generated outputs (docs/ = event catalog from Phase 3;
          # add api/**/generated when oapi-codegen lands in M2).
          git diff --exit-code -- docs

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
