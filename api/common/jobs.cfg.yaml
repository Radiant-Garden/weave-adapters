# oapi-codegen config for jobs.yaml. See common.go for why these options.
package: common
output: jobs.gen.go
generate:
  models: true
output-options:
  # The component files carry no paths, so every schema is "unreferenced" and
  # would otherwise be pruned away to an empty file.
  skip-prune: true
  # Render optional fields as T with omitempty rather than *T, so the generated
  # Job is byte-identical in shape to the hand-written job struct its M3 consumer
  # will carry, and the conformance test can compare them directly.
  prefer-skip-optional-pointer: true
# The Job.error property $refs Problem from errors.yaml. "-" maps that external
# document to this same package, so the generated code uses the Problem already
# emitted into errors.gen.go instead of redeclaring it.
import-mapping:
  ./errors.yaml: "-"
