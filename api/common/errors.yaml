openapi: 3.0.3

# The uniform error model every adapter returns: RFC 9457 problem+json.
#
# A component library, not a servable document: no paths, and /openapi.yaml
# still answers 404. Adapters $ref these schemas from their own spec.
#
# Go counterpart: internal/core/apierror, held identical by common_test.go.
info:
  title: weave-adapters common — errors
  version: 1.0.0
  description: >-
    Shared RFC 9457 problem+json components. Every client-facing error from any
    adapter is one of these, and each is backed by a cataloged event so the
    operator log line and the client body are rendered from one source.

paths: {}

components:
  schemas:
    Problem:
      type: object
      description: >-
        An RFC 9457 problem detail. Returned with Content-Type
        application/problem+json for every client-facing error, including the
        401 and 404/405 produced by middleware rather than by a handler.
      required:
        - type
        - title
        - status
      properties:
        type:
          allOf:
            - $ref: '#/components/schemas/ProblemType'
          description: >-
            Stable slug identifying the error class. Clients may switch on it;
            it is the one field guaranteed not to change wording.

            The enum lists the codes core defines. An adapter may add its own,
            so a client must treat an unrecognised value as an error it does not
            specifically handle rather than as a protocol violation.
          example: weave-adapters:not-found
        title:
          type: string
          description: Short, human-readable summary of the error class.
          example: Not found
        status:
          type: integer
          description: The HTTP status code, repeated in the body per RFC 9457.
          example: 404
        detail:
          type: string
          description: >-
            Explains this specific occurrence. Curated for clients — it is
            rendered from the backing event's ResponseDetail and never carries
            an internal error message.
          example: The requested lease 10.0.0.5 was not found.
        instance:
          type: string
          description: The request path the error occurred on.
          example: /api/v1/leases/10.0.0.5
        requestId:
          type: string
          description: >-
            Correlates this response with the adapter's logs; the same value is
            returned in the X-Request-Id header.
          example: 9f1c2d3e4a5b6c7d
        backendError:
          type: string
          description: >-
            A sanitized message from the backend service, present only when the
            failure originated there. Adapters are responsible for stripping
            credentials and internal hostnames before setting it.
          example: "DHCP server rejected the scope: subnet already in use"
        errors:
          type: array
          description: >-
            Every field that failed validation. All failures are reported at
            once so a client fixes them in one round trip rather than
            discovering them one attempt at a time.
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      description: One field-level validation failure.
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: The parameter or body field that was rejected.
          example: pageSize
        message:
          type: string
          description: >-
            What was expected of that field. Client-safe by construction — it
            describes the expectation, never internal state.
          example: must be at least 1

    ProblemType:
      type: string
      description: >-
        The problem types this version of core defines. An adapter may add its
        own, but never a second error shape.

        Entries exist only for codes something actually returns. The backend
        codes are live: an adapter maps its backend'''s failures onto them, so a
        client sees backend-unavailable or backend-error with a 502 and
        backend-timeout with a 504 rather than one indistinguishable 500. The
        rest of the taxonomy in 02-shared-core.md (precondition-failed) still
        arrives with the code that emits it.

        payload-too-large and unsupported-media-type are request-body
        rejections, raised before a body is decoded and so before any handler
        sees it. conflict is raised by a handler that found the resource it was
        asked to create already there.
      enum:
        - weave-adapters:validation-failed
        - weave-adapters:unauthorized
        - weave-adapters:not-found
        - weave-adapters:method-not-allowed
        - weave-adapters:internal
        - weave-adapters:payload-too-large
        - weave-adapters:unsupported-media-type
        - weave-adapters:conflict
        - weave-adapters:backend-unavailable
        - weave-adapters:backend-timeout
        - weave-adapters:backend-error

