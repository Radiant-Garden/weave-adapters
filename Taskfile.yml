version: '3'

vars:
  BINARY: weave-adapter-dhcp-windows
  CMD_PATH: ./cmd/weave-adapter-dhcp-windows
  BIN_DIR: bin
  # Linux artifact COPYed into the Docker image (host-built, like weave).
  DOCKER_ARTIFACT: weave-adapter-dhcp-windows-linux-arm64
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  LDFLAGS: -ldflags "-X main.version={{.VERSION}}"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the host binary into bin/
    cmds:
      - go build {{.LDFLAGS}} -o {{.BIN_DIR}}/{{.BINARY}} {{.CMD_PATH}}

  build-windows:
    desc: Cross-compile the windows/amd64 binary (primary release artifact)
    env:
      GOOS: windows
      GOARCH: amd64
      CGO_ENABLED: '0'
    cmds:
      - go build {{.LDFLAGS}} -o {{.BIN_DIR}}/{{.BINARY}}.exe {{.CMD_PATH}}

  build:docker:
    desc: Cross-compile the static linux/arm64 binary for the Docker image
    env:
      GOOS: linux
      GOARCH: arm64
      CGO_ENABLED: '0'
    cmds:
      - go build {{.LDFLAGS}} -o {{.DOCKER_ARTIFACT}} {{.CMD_PATH}}

  ci:windows:
    desc: The gate the self-hosted WS2022 runner executes (build + test + smoke + e2e)
    cmds:
      # Deliberately NOT `task ci`. That gate is for a developer machine and a
      # cloud runner; this one runs on an infra-managed host as an unprivileged
      # service account, so it carries only the checks that Windows can answer
      # and Linux cannot:
      #
      #   omitted: check (fmt/vet/lint) — golangci-lint is not on the runner by
      #     design, and lint results are platform-independent, so ci.yml already
      #     covers them on ubuntu. Adding it here would mean asking infra to pin
      #     a second toolchain for a duplicate signal.
      #   omitted: generate-check — docgen output diffed against git, which is
      #     line-ending sensitive; a CRLF checkout would fail it spuriously.
      #   omitted: vulncheck — fetches govulncheck@latest at run time. Unpinned
      #     remote code should not execute on an internal host, and ci.yml
      #     already scans on ubuntu.
      #
      # `e2e` is here and NOWHERE else: it is the only gate that can reach a real
      # DHCP server, and the only one that observes the adapter serving actual
      # scopes. If it fails because the runner's account lacks DHCP read rights,
      # that is a real finding rather than a broken test — a read-only account
      # serving every endpoint is one of the milestone's exit criteria.
      - task: build-windows
      - task: test:windows
      - task: smoke
      - task: e2e

  test:windows:
    desc: Run tests without the race detector (the WS2022 runner has no C toolchain)
    cmds:
      # No -race: the detector requires cgo, cgo requires a C compiler, and the
      # runner carries only Go, Task and git. Asking infra to add mingw-w64 to
      # a locked-down internal host would buy a signal ubuntu already reports
      # on every push -- data races are not a Windows-specific behaviour. What
      # this run is here to catch is path handling, file locking and process
      # semantics, and those need no detector.
      #
      # -shuffle=on is kept: it needs no cgo and order-dependent tests are
      # exactly the kind of thing that surfaces on one platform and not another.
      - go test -shuffle=on ./...

  smoke:
    desc: Build the binary, run it, and verify it serves over a real socket
    cmds:
      # Behind a build tag because it compiles the binary and binds a port, so
      # it has no place in `go test ./...`. Runs on every platform from one
      # source: a regression surfaces on the fast ubuntu job rather than only
      # on the serialized Windows host.
      # -count=1 defeats the test cache. A cached pass here would mean "the
      # inputs did not change", not "the binary still starts and serves" --
      # which is the only claim this task exists to make.
      - go test -count=1 -tags smoke -run TestSmoke ./cmd/...

  e2e:
    desc: Drive the whole read path against a REAL DHCP backend (WS2022 only)
    cmds:
      # Behind its own tag, separate from `smoke`, because the two gates make
      # opposite trades. smoke runs anywhere and asserts nothing about the
      # backend's verdict -- it is about the artifact. This one REQUIRES a
      # reachable DHCP server with read rights and fails loudly without one,
      # because it exists to observe the green path that no other gate in this
      # repo has ever seen: unit tests run against a fake runner, and smoke runs
      # where there is no DHCP at all.
      #
      # That is why it is not in `task ci`: a developer machine has no DHCP role,
      # so it would fail there for a reason that is not a defect. It runs on the
      # WS2022 gate, which is the one host that can answer.
      #
      # To develop these tests off-host, point the shell at a stub that replays a
      # captured fixture -- an existing config knob, not a fake in production
      # code:
      #   WEAVE_ADAPTER_DHCP_POWERSHELL_PATH=/path/to/stub task e2e
      #
      # -count=1 defeats the test cache: a cached pass would mean "the inputs did
      # not change", not "the adapter still reads this host".
      - go test -count=1 -tags e2e -run TestE2E -v ./cmd/...

  run:
    desc: Run the binary from source
    cmds:
      - go run {{.LDFLAGS}} {{.CMD_PATH}}

  test:
    desc: Run tests with the race detector and shuffled order
    cmds:
      - go test -race -shuffle=on ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Verify the golangci-lint config schema and run the linters
    cmds:
      - golangci-lint config verify
      # --build-tags, or the gate silently skips every file behind one. The
      # smoke and e2e harnesses were unlinted from the day they were written,
      # which is how a dozen findings accumulated in code that drives the
      # shipped artifact.
      #
      # Both tags together, not one at a time: with only e2e set, the helpers
      # smoke_test.go uses look unused and the linter reports three false
      # positives.
      - golangci-lint run --build-tags smoke,e2e ./...

  lint-fix:
    desc: Run golangci-lint with autofix
    cmds:
      - golangci-lint run --fix ./...

  fmt:
    desc: Format code (gofmt + gofumpt via golangci-lint)
    cmds:
      - golangci-lint fmt ./...

  check:
    desc: Format, vet and lint (fixes formatting, then fails on remaining issues)
    cmds:
      - task: fmt
      - task: vet
      - task: lint

  vulncheck:
    desc: Scan for known vulnerabilities (govulncheck)
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  tidy:
    desc: Tidy go.mod / go.sum
    cmds:
      - go mod tidy

  generate:
    desc: Run code/doc generators (event-catalog docs, api/common OpenAPI types)
    cmds:
      - go generate ./...

  generate-check:
    desc: Regenerate and fail if generated artifacts are out of date
    cmds:
      - task: generate
      # Scope the diff to generated outputs only, so an otherwise-dirty working
      # tree doesn't fail the check. docs/ is the event catalog; the *.gen.go
      # are oapi-codegen's, and must not drift from the specs beside them.
      # Deliberately NOT all of api/ — that also holds hand-written specs and
      # tests, and an uncommitted edit to those is not a generation failure.
      - git diff --exit-code -- docs ':(glob)api/**/*.gen.go'

  up:
    desc: Build the linux binary and start the adapter in Docker
    deps: [build:docker]
    vars:
      HASH:
        sh: shasum -a 256 {{.DOCKER_ARTIFACT}} | cut -c1-12
    cmds:
      - BINARY_HASH={{.HASH}} docker compose up -d --build
      - echo "adapter up — health at http://localhost:8444/api/v1/health"

  down:
    desc: Stop the adapter container
    cmds:
      - docker compose down

  logs:
    desc: Follow the adapter container logs
    cmds:
      - docker compose logs -f

  restart:
    desc: Rebuild and restart the adapter container
    cmds:
      - task: down
      - task: up

  rebuild:
    desc: Force a no-cache rebuild (use when the image is not updating)
    deps: [build:docker]
    cmds:
      - docker compose down
      - docker compose build --no-cache
      - docker compose up -d

  ci:
    desc: Full local CI gate — mirrors the GitHub Actions pipeline
    cmds:
      - task: check
      - task: generate-check
      - task: build
      - task: build-windows
      - task: test
      - task: smoke
      - task: vulncheck
